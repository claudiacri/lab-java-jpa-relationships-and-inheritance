spring.application.name=HelloLAB8
# URL di connessione al database locale pr_system
spring.datasource.url=jdbc:mysql://localhost:3306/pr_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# Inserisci qui le tue credenziali di accesso a MySQL
spring.datasource.username=root
spring.datasource.password=

# Strategia JPA: crea o aggiorna le tabelle in automatico partendo dalle Entity
spring.jpa.hibernate.ddl-auto=update

# Mostra i comandi SQL eseguiti nella console dell'IDE (comodo per il debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true